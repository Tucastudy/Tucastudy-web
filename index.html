<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUCASTUDY - Inteligência de Elite</title>
    <style>
        /* O SEU DESIGN VOLTOU AQUI */
        body { background: #0b0e14; color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #151921; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px; text-align: center; border: 1px solid #1f2633; }
        h1 { color: #00d4ff; letter-spacing: 2px; margin-bottom: 0.5rem; }
        h1 span { color: #fff; }
        p { color: #8a94a6; font-size: 0.9rem; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #2d3748; background: #1a202c; color: #fff; margin-bottom: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #btn-gerar { background: #00d4ff; color: #0b0e14; }
        #btn-gerar:hover { background: #00b8e6; transform: scale(1.02); }
        #btn-download { background: #2ecc71; color: #fff; margin-top: 1rem; }
        .barra-container { background: #1a202c; height: 10px; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        #barra-progresso { background: #00d4ff; width: 0%; height: 100%; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TUCA<span>STUDY</span></h1>
        <p>Gere guias de estudo profissionais em segundos.</p>
        
        <input type="text" id="tema" placeholder="Ex: Motores, História, Ciência...">
        
        <button id="btn-gerar" onclick="iniciarProcessamento()">GERAR CONTEÚDO</button>

        <div id="area-progresso" style="display: none;">
            <div class="barra-container"><div id="barra-progresso"></div></div>
            <p id="status-texto" style="font-size: 0.8rem;">Sincronizando...</p>
        </div>

        <button id="btn-download" style="display: none;">BAIXAR GUIA COMPLETO</button>
    </div>

    <script>
        const API_KEY = "AIzaSyCSfkTGD1tVKCB6M9Mei_WMIG2cmWJtVQw";

        async function iniciarProcessamento() {
            const tema = document.getElementById('tema').value;
            if (!tema) return alert("Digite um tema!");

            const btnG = document.getElementById('btn-gerar');
            const areaP = document.getElementById('area-progresso');
            const barra = document.getElementById('barra-progresso');
            const status = document.getElementById('status-texto');
            const btnD = document.getElementById('btn-download');

            btnG.style.display = 'none';
            areaP.style.display = 'block';
            btnD.style.display = 'none';
            
            let p = 0;
            let int = setInterval(() => { p += 2; if(p > 90) p = 90; barra.style.width = p + "%"; }, 300);

            try {
                // Rota Pro que você já validou que funciona
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Escreva um artigo técnico e educativo sobre: " + tema }] }],
                        // DESATIVAÇÃO AGRESSIVA DOS FILTROS
                        safetySettings: [
                            { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                        ]
                    })
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0].content) {
                    const texto = data.candidates[0].content.parts[0].text;
                    clearInterval(int);
                    barra.style.width = "100%";
                    status.innerText = "SUCESSO!";
                    btnD.style.display = 'block';
                    btnD.onclick = () => {
                        const b = new Blob([texto], {type: 'text/plain'});
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(b);
                        a.download = "Guia_TucaStudy.txt";
                        a.click();
                    };
                } else {
                    throw new Error("O Google barrou o texto. Tente usar palavras diferentes.");
                }
            } catch (e) {
                clearInterval(int);
                alert("Erro: " + e.message);
                btnG.style.display = 'block';
                areaP.style.display = 'none';
            }
        }
    </script>
</body>
</html>
