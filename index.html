<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TucaStudy - Inteligência Educacional</title>
    <style>
        body { margin: 0; padding: 0; background-color: #1c1c1c; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; height: 70px; background-color: #121212; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid #33ccff; box-shadow: 0 0 15px #33ccff55; }
        .brand-name { font-size: 24px; font-weight: bold; color: #33ccff; text-shadow: 0 0 10px #33ccff; letter-spacing: 2px; }
        main { padding: 40px 20px; text-align: center; width: 100%; max-width: 400px; }
        h1 { font-size: 1.5rem; color: #fff; margin-bottom: 20px; }
        input { padding: 15px; border-radius: 8px; border: 1px solid #333; width: 90%; background: #222; color: white; margin-bottom: 20px; outline: none; }
        input:focus { border-color: #33ccff; }
        #btn-gerar { background-color: #33ccff; color: #121212; border: none; padding: 15px 30px; font-weight: bold; border-radius: 8px; cursor: pointer; box-shadow: 0 0 10px #33ccff; width: 100%; }
        #area-progresso { display: none; margin-top: 30px; width: 100%; }
        #barra-bg { width: 100%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; margin: 10px 0; }
        #barra-progresso { width: 0%; height: 100%; background: #33ccff; transition: 1s; box-shadow: 0 0 10px #33ccff; }
        #btn-download { display: none; background-color: #2ecc71; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>
    <header>
        <div class="brand-name">TUCASTUDY</div>
    </header>
    <main>
        <h1>Guia de Estudo IA</h1>
        <input type="text" id="tema" placeholder="Ex: Mecânica Automotiva">
        <button id="btn-gerar" onclick="iniciarProcessamento()">GERAR CONTEÚDO</button>
        
        <div id="area-progresso">
            <p id="status-texto" style="font-size: 14px; color: #33ccff;">Iniciando IA...</p>
            <div id="barra-bg"><div id="barra-progresso"></div></div>
            <p style="font-size: 11px; color: #777;">Processando guia de alta performance. Aguarde.</p>
        </div>
        
        <button id="btn-download">BAIXAR GUIA COMPLETO</button>
    </main>
    <script src="script.js"></script>
</body>
</html>
