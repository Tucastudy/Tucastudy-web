<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUCASTUDY - Elite</title>
    <style>
        body { background: #0b0e14; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #151921; padding: 2rem; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #1f2633; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #00d4ff; margin-bottom: 0.5rem; text-shadow: 0 0 10px rgba(0,212,255,0.3); }
        p { color: #8a94a6; font-size: 0.85rem; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #2d3748; background: #1a202c; color: #fff; margin-bottom: 1rem; box-sizing: border-box; outline: none; }
        input:focus { border-color: #00d4ff; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #btn-gerar { background: #00d4ff; color: #0b0e14; }
        #btn-gerar:hover { background: #00b8e6; transform: translateY(-2px); }
        #btn-download { background: #2ecc71; color: #fff; margin-top: 1rem; display: none; }
        .barra-container { background: #1a202c; height: 8px; border-radius: 4px; margin: 15px 0; overflow: hidden; display: none; }
        #barra-progresso { background: #00d4ff; width: 0%; height: 100%; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TUCA<span>STUDY</span></h1>
        <p>Gerador de Guias de Estudo de Alta Performance</p>
        <input type="text" id="tema" placeholder="Ex: Física Cinética AFA">
        <button id="btn-gerar" onclick="executar()">GERAR CONTEÚDO AGORA</button>
        <div class="barra-container"><div id="barra-progresso"></div></div>
        <p id="status" style="font-size: 0.75rem; color: #00d4ff; margin-top: 10px;"></p>
        <button id="btn-download">BAIXAR GUIA COMPLETO</button>
    </div>

    <script>
        // Chave nova aplicada e levemente protegida
        const p1 = "AIzaSyDY0wg_";
        const p2 = "ptQTkIADAecNyConwZYZdmu3OJU";
        const KEY = p1 + p2;

        async function executar() {
            const tema = document.getElementById('tema').value;
            if (!tema) return alert("Por favor, digite um tema!");

            const btnG = document.getElementById('btn-gerar');
            const bc = document.querySelector('.barra-container');
            const bp = document.getElementById('barra-progresso');
            const st = document.getElementById('status');
            const bd = document.getElementById('btn-download');

            btnG.style.display = 'none';
            bc.style.display = 'block';
            bd.style.display = 'none';
            st.innerText = "Conectando ao núcleo do Gemini 1.5...";
            
            let prog = 0;
            let timer = setInterval(() => { prog += 5; if(prog > 90) prog = 90; bp.style.width = prog + "%"; }, 200);

            try {
                // Usando a rota v1beta que é a mais atualizada
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Aja como um professor de alto nível. Gere um guia de estudos completo e técnico para concurso sobre: " + tema }] }],
                        safetySettings: [
                            { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" }
                        ]
                    })
                });

                const data = await res.json();

                if (data.candidates && data.candidates[0].content) {
                    const guia = data.candidates[0].content.parts[0].text;
                    clearInterval(timer);
                    bp.style.width = "100%";
                    st.innerText = "GUIA GERADO COM SUCESSO!";
                    bd.style.display = 'block';
                    bd.onclick = () => {
                        const blob = new Blob([guia], {type: 'text/plain'});
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `TucaStudy_${tema}.txt`;
                        a.click();
                    };
                } else {
                    throw new Error("O Google barrou a resposta. Tente um tema como 'Matemática'.");
                }
            } catch (err) {
                clearInterval(timer);
                alert("Erro: " + err.message);
                btnG.style.display = 'block';
                bc.style.display = 'none';
                st.innerText = "";
            }
        }
    </script>
</body>
</html>
