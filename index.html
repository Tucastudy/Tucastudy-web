<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TucaStudy - Guia de Elite</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>TUCA<span>STUDY</span></h1>
            <p>Sua inteligência artificial para guias de estudo</p>
        </header>

        <main>
            <div class="input-group">
                <label for="tema">O que você quer estudar hoje?</label>
                <input type="text" id="tema" placeholder="Ex: Motores a combustão, História do Brasil...">
            </div>

            <button id="btn-gerar" onclick="iniciarProcessamento()">GERAR CONTEÚDO</button>

            <div id="area-progresso" style="display: none;">
                <div class="barra-container">
                    <div id="barra-progresso"></div>
                </div>
                <p id="status-texto">Iniciando motor de IA...</p>
            </div>

            <button id="btn-download" style="display: none;">BAIXAR GUIA COMPLETO</button>
        </main>

        <footer>
            <p>&copy; 2026 TucaStudy Project - Todos os direitos reservados</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
