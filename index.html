<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUCASTUDY</title>
    <style>
        body { background: #0b0e14; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: #151921; padding: 30px; border-radius: 12px; width: 320px; text-align: center; border: 1px solid #1f2633; }
        h1 { color: #00d4ff; font-size: 24px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #2d3748; background: #1a202c; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; background: #00d4ff; color: #0b0e14; }
        #status { font-size: 12px; color: #00d4ff; margin-top: 15px; }
        #btn-dl { background: #2ecc71; color: #fff; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="box">
        <h1>TUCA<span>STUDY</span></h1>
        <input type="text" id="tema" placeholder="Ex: Física Cinética">
        <button id="btn-g" onclick="gerar()">GERAR GUIA</button>
        <p id="status"></p>
        <button id="btn-dl">BAIXAR GUIA</button>
    </div>

    <script>
        // DIVISÃO DA CHAVE EM PARTES PEQUENAS PARA EVITAR BLOQUEIO
        const a = "AIzaSyDY";
        const b = "0wg_ptQT";
        const c = "kIADAecNyC";
        const d = "onwZYZdmu3OJU";
        const API_KEY = a + b + c + d;

        async function gerar() {
            const tema = document.getElementById('tema').value;
            if(!tema) return;

            const btnG = document.getElementById('btn-g');
            const st = document.getElementById('status');
            const btnD = document.getElementById('btn-dl');

            btnG.style.display = 'none';
            st.innerText = "IA processando guia técnico...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Gere um guia de estudo didático e completo sobre: " + tema }] }]
                    })
                });

                const data = await response.json();
                
                if(data.candidates && data.candidates[0].content) {
                    const txt = data.candidates[0].content.parts[0].text;
                    st.innerText = "CONCLUÍDO!";
                    btnD.style.display = 'block';
                    btnD.onclick = () => {
                        const blob = new Blob([txt], {type: 'text/plain'});
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.href = url;
                        link.download = `Estudo_${tema}.txt`;
                        link.click();
                    };
                } else {
                    throw new Error("Erro de conexão");
                }
            } catch (e) {
                alert("Erro: " + e.message);
                btnG.style.display = 'block';
                st.innerText = "";
            }
        }
    </script>
</body>
</html>
