<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUCASTUDY - Inteligência de Elite</title>
    <style>
        body { background: #0b0e14; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #151921; padding: 2rem; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #1f2633; }
        h1 { color: #00d4ff; margin-bottom: 0.5rem; }
        p { color: #8a94a6; font-size: 0.9rem; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #2d3748; background: #1a202c; color: #fff; margin-bottom: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #btn-gerar { background: #00d4ff; color: #0b0e14; }
        #btn-download { background: #2ecc71; color: #fff; margin-top: 1rem; display: none; }
        .barra-container { background: #1a202c; height: 10px; border-radius: 5px; margin: 15px 0; overflow: hidden; display: none; }
        #barra-progresso { background: #00d4ff; width: 0%; height: 100%; transition: 0.2s; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TUCA<span>STUDY</span></h1>
        <p>Gere guias para AFA, Concursos e Escola.</p>
        <input type="text" id="tema" placeholder="Ex: Física Cinética AFA">
        <button id="btn-gerar" onclick="iniciarProcessamento()">GERAR GUIA AGORA</button>
        <div id="area-progresso" class="barra-container"><div id="barra-progresso"></div></div>
        <p id="status-texto" style="font-size: 0.8rem; color: #00d4ff;"></p>
        <button id="btn-download">BAIXAR GUIA COMPLETO</button>
    </div>

    <script>
        const API_KEY = "AIzaSyCSfkTGD1tVKCB6M9Mei_WMIG2cmWJtVQw";

        async function iniciarProcessamento() {
            const tema = document.getElementById('tema').value;
            if (!tema) return alert("Digite um tema!");

            const btnG = document.getElementById('btn-gerar');
            const areaP = document.querySelector('.barra-container');
            const barra = document.getElementById('barra-progresso');
            const status = document.getElementById('status-texto');
            const btnD = document.getElementById('btn-download');

            btnG.style.display = 'none';
            areaP.style.display = 'block';
            btnD.style.display = 'none';
            status.innerText = "Consultando Base de Dados...";
            
            let p = 0;
            let int = setInterval(() => { p += 5; if(p > 90) p = 90; barra.style.width = p + "%"; }, 150);

            try {
                // Trocamos para o modelo FLASH (mais rápido e menos restritivo)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Gere um guia de estudo acadêmico e técnico para nível de concurso sobre: " + tema }] }],
                        safetySettings: [
                            { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" }
                        ]
                    })
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0].content) {
                    const texto = data.candidates[0].content.parts[0].text;
                    clearInterval(int);
                    barra.style.width = "100%";
                    status.innerText = "CONCLUÍDO COM SUCESSO!";
                    btnD.style.display = 'block';
                    btnD.onclick = () => {
                        const b = new Blob([texto], {type: 'text/plain'});
                        const link = document.createElement('a');
                        link.href = URL.createObjectURL(b);
                        link.download = `TucaStudy_${tema}.txt`;
                        link.click();
                    };
                } else {
                    throw new Error("O Google barrou por segurança. Tente mudar o nome do tema.");
                }
            } catch (e) {
                clearInterval(int);
                alert("Erro: " + e.message);
                btnG.style.display = 'block';
                areaP.style.display = 'none';
                status.innerText = "";
            }
        }
    </script>
</body>
</html>
